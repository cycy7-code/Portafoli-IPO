                    <label class="absolute right-0 top-8 cursor-pointer text-xl sm:hidden" for="navbar-open">

            <div class="w-full h-full flex justify-center items-center Montserrat font-bold mt-48 text-6xl md:text-8xl" style="color: white; text-align: center;">
                <h1 id="typewriter"></h1>
            </div>
            
            <div class="px-4">
                <h1 style="color: white; text-align: center;" class="mt-12 text-4xl md:text-6xl uppercase tracking-tighter"><span class="Montserrat font-bold">SOC RAÚL MÁRQUEZ PARENTE</span></h1>
                <h1 style="color: white; text-align: center;" class="mt-8 text-xl md:text-3xl"><span class="Montserrat font-bold">BENVINGUTS AL MEU PORTAFOLI PERSONAL</span></h1>
            </div>
        </div>
    </main>

    <script>
    const words = ["HOLA!👋", "BENVINGUTS!", "HELLO!"];
    let i = 0;
    let j = 0;
    let currentWord = "";
    let isDeleting = false;
    
    function type() {
      currentWord = words[i];
      if (isDeleting) {
        document.getElementById("typewriter").textContent = currentWord.substring(0, j-1);
        j--;
        if (j == 0) {
          isDeleting = false;
          i++;
          if (i == words.length) {
            i = 0;
          }
        }
      } else {
        document.getElementById("typewriter").textContent = currentWord.substring(0, j+1);
        j++;
        if (j == currentWord.length) {
          isDeleting = true;
        }
      }
      setTimeout(type, 200);
    }
    
    type();
    </script>
